name: Promote docs to production
run-name: Promote docs to production (by @${{ github.actor }})

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  promote:
    name: Fast-forward main to development
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10

    steps:
      - name: Mint installation token for miru-docs-promoter
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.DOCS_PROMOTER_APP_ID }}
          private-key: ${{ secrets.DOCS_PROMOTER_APP_PRIVATE_KEY }}
          # Scope the token to this repo only
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Check out main with promoter token
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Fetch development
        run: |
          git fetch origin development:development

      - name: Verify fast-forward is possible
        run: |
          set -euo pipefail
          main_sha=$(git rev-parse main)
          dev_sha=$(git rev-parse development)
          echo "main:        $main_sha"
          echo "development: $dev_sha"

          if [ "$main_sha" = "$dev_sha" ]; then
            echo "main already equals development — nothing to promote. Exiting cleanly."
            echo "NO_OP=true" >> "$GITHUB_ENV"
            exit 0
          fi

          if ! git merge-base --is-ancestor "$main_sha" "$dev_sha"; then
            echo "::error::main has diverged from development — cannot fast-forward."
            echo "::error::Rebase development onto main first, or investigate unexpected commits on main."
            exit 1
          fi

          echo "fast-forward is valid."

      - name: Fast-forward main to development
        if: env.NO_OP != 'true'
        run: |
          set -euo pipefail
          git checkout main
          git merge --ff-only development
          git push --ff-only origin main

      - name: Summary
        run: |
          {
            echo "### Docs promotion complete"
            echo ""
            echo "- **Initiated by:** @${{ github.actor }}"
            echo "- **Approver:** see workflow run's Deployments panel or 'Review deployments' event."
            echo "- **main SHA:**        \`$(git rev-parse main)\`"
            echo "- **development SHA:** \`$(git rev-parse development)\`"
            if [ "${NO_OP:-false}" = "true" ]; then
              echo "- **Result:** no-op (main already equals development)"
            else
              echo "- **Result:** fast-forwarded"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
