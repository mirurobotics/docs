name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - staging
      - uat
      - production
  workflow_call:

jobs:
  changes:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
      pull-requests: read
    outputs:
      custom-linter: ${{ steps.filter.outputs.custom-linter }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            custom-linter:
              - 'tools/lint/**'

  lint:
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint smoke tests
        run: pnpm run test:lint

      - name: Run documentation lint
        run: ./scripts/lint.sh

  audit:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: ./scripts/audit.sh

  shell-tests:
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Run shell script tests
        run: bats pub/scripts/agent/check-miru-access_test.bats

  lint-custom-linter:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.custom-linter == 'true'
    timeout-minutes: 10
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: tools/lint/go.mod

      - name: Run Go lint on tools/lint
        env:
          LINT_FIX: "0"
        run: ./tools/lint/scripts/lint.sh

  test-custom-linter:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.custom-linter == 'true'
    timeout-minutes: 10
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: tools/lint/go.mod

      - name: Run coverage gate for tools/lint
        run: ./tools/lint/scripts/covgate.sh
