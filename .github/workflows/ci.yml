name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - staging
      - uat
      - production
  workflow_call:

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      custom-linter: ${{ steps.filter.outputs.custom-linter }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            custom-linter:
              - 'tools/lint/**'

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enable corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint smoke tests
        run: pnpm run test:lint

      - name: Run documentation lint
        run: ./scripts/lint.sh

  audit:
    runs-on: ubuntu-latest
    steps:

      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enable corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: ./scripts/audit.sh

  shell-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Run shell script tests
        run: bats pub/scripts/agent/check-miru-access_test.bats

  lint-custom-linter:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.custom-linter == 'true'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/lint/go.mod

      - name: Run Go lint on tools/lint
        env:
          LINT_FIX: "0"
        run: ./tools/lint/scripts/lint.sh

  test-custom-linter:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.custom-linter == 'true'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/lint/go.mod

      - name: Run coverage gate for tools/lint
        run: ./tools/lint/scripts/covgate.sh
