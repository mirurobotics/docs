openapi: 3.0.3
info:
  title: Miru Agent API
  description: The API between the Miru Agent and any external client living on the
    same device as the Miru Agent
  version: v0.2
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  x-release-version: v0.2.0-beta.1
  x-git-commit:
    sha: f32bac0eb62ffe2f2518528fe973ce47fba7f737
    url: https://github.com/mirurobotics/openapi/commit/f32bac0eb62ffe2f2518528fe973ce47fba7f737
    message: 'refactor(device): update SSE event schemas for v0.2.1 (#14)


      ## Summary


      - Drop `.beta1` suffix from event type strings — events are now

      versioned with the API version (`deployment.deployed` instead of

      `deployment.deployed.beta1`)

      - Rename schemas: `DeploymentDeployedBeta1Event` →

      `DeploymentDeployedEvent`, `DeploymentRemovedBeta1Event` →

      `DeploymentRemovedEvent`

      - Add `release_id`, `status`, and `error_status` fields to both

      deployment event data schemas

      - Remove 400/410 error responses from `GET /events` for consistency with

      other Device API endpoints


      ## Test plan


      - [x] `make -C apis/apps/device-server bundle` succeeds

      - [x] `make -C apis/apps/device-server validate` passes (no new

      warnings)

      - [x] `scripts/lint.sh` passes (all custom MIRU rules clean)

      - [x] No `beta1` references remain in device-server source files

      - [ ] Downstream codegen produces updated schema names and fields


      🤖 Generated with [Claude Code](https://claude.com/claude-code)


      Co-authored-by: Claude Opus 4.6 (1M context) <noreply@anthropic.com>'
    author: ben-miru
    branch: HEAD
    dirty: false
  x-build:
