        content:
          $ref: '#/components/schemas/InstanceContent'
    ConfigSchemaExpansion:
      type: string
      enum:
      - documents
      - config_type
      x-enum-varnames:
      - CONFIG_SCHEMA_EXPAND_DOCUMENTS
      - CONFIG_SCHEMA_EXPAND_CONFIG_TYPE
    ConfigSchemaOrderBy:
      type: string
      enum:
      - id:asc
      - id:desc
      - created_at:desc
      - created_at:asc
      x-enum-varnames:
      - CONFIG_SCHEMA_ORDER_BY_ID_ASC
      - CONFIG_SCHEMA_ORDER_BY_ID_DESC
      - CONFIG_SCHEMA_ORDER_BY_CREATED_AT_DESC
      - CONFIG_SCHEMA_ORDER_BY_CREATED_AT_ASC
      default: created_at:desc
    ConfigSchemaListExpansion:
      type: string
      enum:
      - total_count
      - documents
      - config_type
      x-enum-varnames:
      - CONFIG_SCHEMA_LIST_EXPAND_TOTAL_COUNT
      - CONFIG_SCHEMA_LIST_EXPAND_DOCUMENTS
      - CONFIG_SCHEMA_LIST_EXPAND_CONFIG_TYPE
    ConfigSchemaList:
      title: Config Schema List
      allOf:
      - $ref: '#/components/schemas/PaginatedList'
      - type: object
        required:
        - data
        properties:
          data:
            description: The list of config schemas.
            type: array
            items:
              $ref: '#/components/schemas/ConfigSchema'
    ConfigTypeRef:
      title: Config Type Reference
      description: A reference to a config type. At least one of `id` or `slug` must
        be provided. When both are provided, `id` takes precedence and `slug` is ignored.
      type: object
      properties:
        id:
          type: string
          example: cfg_123
          description: ID of the config type. Takes precedence over `slug` when both
            are provided.
        slug:
          type: string
          example: my-config-type
          description: An immutable, code-friendly name for the config type. Used
            only when `id` is not provided.
    CreateSchemaDocument:
      title: Schema Document
      type: object
      required:
      - name
      - data
      properties:
        name:
          type: string
          description: The name of this document.
          example: motion-control.json
        data:
          type: string
          description: The raw document content.
    GitCommitRef:
      title: Git Commit Reference
      description: A reference to a git commit. At least one of `id` or `sha` must
        be provided. When both are provided, `id` takes precedence and `sha` is ignored.
      type: object
      properties:
        id:
          type: string
          description: ID of the git commit. Takes precedence over `sha` when both
            are provided.
          example: git_cmt_123
        sha:
          type: string
          description: The SHA hash of the git commit. Used only when `id` is not
            provided.
          example: 1a2b3c4d...
    CreateConfigSchemaGitCommitRequest:
      title: Git Commit Request
      type: object
      required:
      - commit_ref
      - schema_filepaths
      properties:
        commit_ref:
          $ref: '#/components/schemas/GitCommitRef'
        schema_filepaths:
          type: array
          description: The file paths of the config schema files relative to the git
            repository root. JSON Schema only supports a single file for a schema.
            CUE support multiple files via [packages](https://cuelang.org/docs/references/spec/#packages).
          items:
            type: string
          example:
          - path/to/config/schema/robot1.cue
          - path/to/config/schema/robot2.cue
    CreateConfigSchemaRequest:
      title: Create Config Schema Request
      type: object
      required:
      - config_type_ref
      - language
      - format
      - documents
      properties:
        config_type_ref:
          $ref: '#/components/schemas/ConfigTypeRef'
        instance_filepath:
          type: string
          description: The file path for config instances created from this schema.
          example: /v1/motion-control.json
        language:
          $ref: '#/components/schemas/SchemaLanguage'
        format:
          $ref: '#/components/schemas/SchemaFormat'
        documents:
          type: array
          description: The schema document files.
          items:
            $ref: '#/components/schemas/CreateSchemaDocument'
        git_commit:
          description: The git commit to link to this config schema.
          allOf:
          - $ref: '#/components/schemas/CreateConfigSchemaGitCommitRequest'
    UpdateConfigTypeRequest:
      title: UpdateConfigTypeRequest
      type: object
      properties:
        name:
          type: string
          description: The updated name of the config type.
          example: My Config Type
        slug:
          type: string
          description: The updated slug for the config type.
          example: my-config-type
    ConfigTypeOrderBy:
      type: string
      enum:
      - id:asc
      - id:desc
      - created_at:desc
      - created_at:asc
      x-enum-varnames:
      - CONFIG_TYPE_ORDER_BY_ID_ASC
      - CONFIG_TYPE_ORDER_BY_ID_DESC
      - CONFIG_TYPE_ORDER_BY_CREATED_AT_DESC
      - CONFIG_TYPE_ORDER_BY_CREATED_AT_ASC
      default: created_at:desc
    ConfigTypeListExpansion:
      type: string
      enum:
      - total_count
      x-enum-varnames:
      - CONFIG_TYPE_LIST_EXPAND_TOTAL_COUNT
    ConfigTypeList:
      title: Config Type List
      allOf:
      - $ref: '#/components/schemas/PaginatedList'
      - type: object
        required:
        - data
        properties:
          data:
            description: The list of config types.
            type: array
            items:
              $ref: '#/components/schemas/ConfigType'
    CreateConfigTypeRequest:
      title: CreateConfigTypeRequest
      type: object
      required:
      - name
      - slug
      properties:
        name:
          type: string
          description: The name of the config type.
          example: My Config Type
        slug:
          type: string
          description: An immutable, code-friendly name for the config type.
          example: my-config-type
    DeploymentExpansion:
      type: string
      enum:
      - device
      - release
      - config_instances
      x-enum-varnames:
      - DEPLOYMENT_EXPAND_DEVICE
      - DEPLOYMENT_EXPAND_RELEASE
      - DEPLOYMENT_EXPAND_CONFIG_INSTANCES
    DeploymentStatus:
      type: string
      description: |
        This status merges the 'activity_status' and 'error_status' fields, with error states taking precedence over activity states when errors are present. For example, if the activity status is 'deployed' but the error status is 'failed', the status is 'failed'. However, if the error status is 'none' and the activity status is 'deployed', the status is 'deployed'.
      enum:
      - drifted
      - staged
      - queued
      - deployed
      - archived
      - failed
      - retrying
      x-enum-varnames:
      - DEPLOYMENT_STATUS_DRIFTED
      - DEPLOYMENT_STATUS_STAGED
      - DEPLOYMENT_STATUS_QUEUED
      - DEPLOYMENT_STATUS_DEPLOYED
      - DEPLOYMENT_STATUS_ARCHIVED
      - DEPLOYMENT_STATUS_FAILED
      - DEPLOYMENT_STATUS_RETRYING
    DeploymentActivityStatus:
      type: string
      description: |
        Last known activity state of the deployment.
        - Drifted: device's configurations have drifted since this deployment was staged, and the deployment needs to be reviewed before it can be deployed
        - Staged: is ready to be deployed
        - Queued: the deployment's config instances are waiting to be received by the device; will be deployed as soon as the device is online
        - Deployed: the deployment's config instances are currently available for consumption on the device
        - Archived: the deployment is available for historical reference but cannot be deployed and is not active on the device
      enum:
      - drifted
      - staged
      - queued
      - deployed
      - archived
      x-enum-varnames:
      - DEPLOYMENT_ACTIVITY_STATUS_DRIFTED
      - DEPLOYMENT_ACTIVITY_STATUS_STAGED
      - DEPLOYMENT_ACTIVITY_STATUS_QUEUED
      - DEPLOYMENT_ACTIVITY_STATUS_DEPLOYED
      - DEPLOYMENT_ACTIVITY_STATUS_ARCHIVED
    DeploymentErrorStatus:
      type: string
      description: |
        Last known error state of the deployment.
        - None: no errors
        - Retrying: an error has been encountered and the agent is retrying to reach the target status
        - Failed: a fatal error has been encountered; the deployment is archived and (if deployed) removed from the device
      enum:
      - none
      - failed
      - retrying
      x-enum-varnames:
      - DEPLOYMENT_ERROR_STATUS_NONE
      - DEPLOYMENT_ERROR_STATUS_FAILED
      - DEPLOYMENT_ERROR_STATUS_RETRYING
    DeploymentTargetStatus:
      type: string
      description: |
        Desired state of the deployment.
        - Staged: is ready to be deployed
        - Deployed: all config instances part of the deployment are available for consumption on the device
        - Archived: the deployment is available for historical reference but cannot be deployed and is not active on the device
      enum:
      - staged
      - deployed
      - archived
      x-enum-varnames:
      - DEPLOYMENT_TARGET_STATUS_STAGED
      - DEPLOYMENT_TARGET_STATUS_DEPLOYED
      - DEPLOYMENT_TARGET_STATUS_ARCHIVED
    BaseDeployment:
      title: Base Deployment
      type: object
      required:
      - object
      - id
      - description
      - status
      - activity_status
      - error_status
      - target_status
      - device_id
      - release_id
      - created_at
      - updated_at
      properties:
        object:
          type: string
          enum:
          - deployment
          example: deployment
          x-stainless-const: true
          description: The object type, which is always `deployment`.
        id:
          type: string
          example: dpl_123
          description: ID of the deployment.
        description:
          type: string
          example: Deployment for the motion control config instance
          description: The description of the deployment.
        status:
          $ref: '#/components/schemas/DeploymentStatus'
        activity_status:
          $ref: '#/components/schemas/DeploymentActivityStatus'
        error_status:
          $ref: '#/components/schemas/DeploymentErrorStatus'
        target_status:
          $ref: '#/components/schemas/DeploymentTargetStatus'
        device_id:
          type: string
          example: dvc_123
          description: ID of the device.
        release_id:
          type: string
          example: rls_123
          description: ID of the release.
        created_at:
          type: string
          format: date-time
          example: '2024-01-01T00:00:00Z'
          description: Timestamp of when the device release was created.
        updated_at:
          type: string
          format: date-time
          example: '2024-01-01T00:00:00Z'
          description: Timestamp of when the device release was last updated.
    DeviceStatus:
      type: string
      description: |
        The status of the device.
        - Inactive: The miru agent has not yet been installed / authenticated
        - Activating: The miru agent is currently being installed / authenticated (should only last for a few seconds)
        - Online: The miru agent has successfully pinged the server within the last 60 seconds.
        - Offline: The miru agent has not successfully pinged the server within the last 60 seconds (e.g. network issues, device is powered off, etc.)
      enum:
      - inactive
      - activating
      - online
      - offline
      x-enum-varnames:
      - DEVICE_STATUS_INACTIVE
      - DEVICE_STATUS_ACTIVATING
      - DEVICE_STATUS_ONLINE
      - DEVICE_STATUS_OFFLINE
    BaseDevice:
      title: Base Device
      type: object
      required:
      - object
      - id
      - name
      - status
      - agent_version
      - last_connected_at
      - last_disconnected_at
      - created_at
      - updated_at
      properties:
        object:
          type: string
          enum:
          - device
          example: device
          x-stainless-const: true
          description: The object type, which is always `device`.
        id:
          type: string
          example: dvc_123
          description: ID of the device.
        name:
          type: string
          example: My Device
          description: Name of the device.
        status:
          $ref: '#/components/schemas/DeviceStatus'
        agent_version:
          type: string
          example: v1.0.0
          description: The version of the agent the device is running.
          nullable: true
        last_connected_at:
          type: string
          format: date-time
          example: '2021-01-01T00:00:00Z'
          nullable: true
          description: Timestamp of when the device was last made an initial connection
            (this is not the same as the last time the device was seen).
        last_disconnected_at:
          type: string
          format: date-time
          example: '2021-01-01T00:00:00Z'
          nullable: true
          description: Timestamp of when the device was last disconnected (this is
            not the same as the last time the device was seen).
        created_at:
          type: string
          format: date-time
          example: '2021-01-01T00:00:00Z'
          description: Timestamp of when the device was created.
        updated_at:
          type: string
          format: date-time
          example: '2021-01-01T00:00:00Z'
          description: Timestamp of when the device was last updated.
    Device:
      allOf:
      - $ref: '#/components/schemas/BaseDevice'
      example:
        object: device
        id: dvc_123
        name: My Device
        status: online
        agent_version: v1.0.0
        last_connected_at: '2021-01-01T00:00:00Z'
        last_disconnected_at: null
        created_at: '2021-01-01T00:00:00Z'
        updated_at: '2021-01-01T00:00:00Z'
    BaseRelease:
      title: Base Release
      type: object
      required:
      - object
      - id
      - version
      - git_commit_id
      - created_at
      - updated_at
      properties:
        object:
          type: string
          enum:
          - release
          example: release
          x-stainless-const: true
          description: The object type, which is always `release`.
        id:
          type: string
          example: rls_123
          description: ID of the release.
        version:
          type: string
          example: v1.0.0
          description: The version of the release.
        git_commit_id:
          type: string
          nullable: true
          example: git_commit_123
          description: The ID of the git commit associated with this release.
        created_at:
          type: string
          format: date-time
          example: '2024-01-01T00:00:00Z'
          description: Timestamp of when the release was created.
        updated_at:
          type: string
          format: date-time
          example: '2024-01-01T00:00:00Z'
          description: Timestamp of when the release was last updated.
    Release:
      title: Release
      allOf:
      - $ref: '#/components/schemas/BaseRelease'
      - type: object
        properties:
          config_schemas:
            type: array
            items:
              $ref: '#/components/schemas/ConfigSchema'
            description: Expand the config schemas using 'expand=config_schemas' in
              the query string.
            example:
            - object: config_schema
              id: cfg_sch_123
              digest: sha256:1234567890
              config_type_name: Motion Control
              instance_filepath: /v1/motion-control.json
              created_at: '2021-01-01T00:00:00Z'
              updated_at: '2021-01-01T00:00:00Z'
              config_type_id: cfg_typ_123
              language: jsonschema
              format: json
            - object: config_schema
              id: cfg_sch_124
              digest: sha256:1234567890
              config_type_name: Localization
              instance_filepath: /v1/localization.json
              created_at: '2021-01-01T00:00:00Z'
              updated_at: '2021-01-01T00:00:00Z'
              config_type_id: cfg_typ_124
              language: jsonschema
              format: json
      example:
        object: release
        id: rls_123
        version: v1.0.0
        git_commit_id: git_commit_123
        created_at: '2024-01-01T00:00:00Z'
        updated_at: '2024-01-01T00:00:00Z'
    Deployment:
      title: Deployment
      allOf:
      - $ref: '#/components/schemas/BaseDeployment'
      - type: object
        properties:
          device:
            allOf:
            - $ref: '#/components/schemas/Device'
            description: Expand the device using 'expand=device' in the query string.
          release:
            allOf:
            - $ref: '#/components/schemas/Release'
            description: Expand the release using 'expand=release' in the query string.
          config_instances:
            type: array
            items:
              $ref: '#/components/schemas/ConfigInstance'
            description: Expand the config instances using 'expand=config_instances'
              in the query string.
            example:
            - object: config_instance
              id: cfg_inst_123
              config_type_name: Motion Control
              filepath: /v1/motion-control.json
              created_at: '2021-01-01T00:00:00Z'
              config_schema_id: cfg_sch_123
              config_type_id: cfg_typ_123
            - object: config_instance
              id: cfg_inst_124
              config_type_name: Localization
              filepath: /v1/localization.json
              created_at: '2021-01-01T00:00:00Z'
              config_schema_id: cfg_sch_124
              config_type_id: cfg_typ_124
      example:
        object: deployment
        id: dpl_123
        description: Deployment for the motion control config instance
        status: staged
        activity_status: staged
        error_status: none
        target_status: staged
        device_id: dvc_123
        release_id: rls_123
        created_at: '2024-01-01T00:00:00Z'
        updated_at: '2024-01-01T00:00:00Z'
    DeploymentOrderBy:
      type: string
      enum:
      - id:asc
      - id:desc
      - created_at:desc
      - created_at:asc
      x-enum-varnames:
      - DEPLOYMENT_ORDER_BY_ID_ASC
      - DEPLOYMENT_ORDER_BY_ID_DESC
      - DEPLOYMENT_ORDER_BY_CREATED_AT_DESC
      - DEPLOYMENT_ORDER_BY_CREATED_AT_ASC
      default: created_at:desc
    DeploymentListExpansion:
      type: string
      enum:
      - total_count
      - device
      - release
      - config_instances
      x-enum-varnames:
      - DEPLOYMENT_LIST_EXPAND_TOTAL_COUNT
      - DEPLOYMENT_LIST_EXPAND_DEVICE
      - DEPLOYMENT_LIST_EXPAND_RELEASE
      - DEPLOYMENT_LIST_EXPAND_CONFIG_INSTANCES
    DeploymentList:
      title: Deployment List
      allOf:
      - $ref: '#/components/schemas/PaginatedList'
      - type: object
        required:
        - data
        properties:
          data:
            description: The list of deployments.
            type: array
            items:
              $ref: '#/components/schemas/Deployment'
    CreateDeploymentTargetStatus:
      type: string
      description: "Desired state of the deployment. \n- Staged: ready for deployment.\
        \ Deployments can only be staged if their release is not the current release\
        \ for the device.\n- Deployed: deployed to the device. Deployments can only\
        \ be deployed if their release is the device's current release.\n"
      enum:
      - staged
      - deployed
      x-enum-varnames:
      - CREATE_STAGED_DEPLOYMENT
      - CREATE_DEPLOYED_DEPLOYMENT
    CreateDeploymentRequest:
      title: Create Deployment Request
      type: object
      required:
      - target_status
      - description
      - release_id
      - device_id
      - config_instance_ids
      properties:
        target_status:
          $ref: '#/components/schemas/CreateDeploymentTargetStatus'
        description:
          type: string
          description: The description of the deployment.
          example: Deployment for the motion control config instance
        release_id:
          type: string
          description: The release ID which this deployment adheres to.
          example: rls_123
        parent_id:
          type: string
          description: The ID of the deployment that this deployment was patched from.
          example: dpl_123
        device_id:
          type: string
          description: The ID of the device that the deployment is being created for.
          example: dvc_123
        config_instance_ids:
          type: array
          description: The IDs of the config instances to deploy. A deployment must
            have exactly one config instance for each config schema in the deployment's
            release.
          items:
            type: string
            example: cfg_inst_123
    UpdateDeviceRequest:
      title: Update Device Request
      type: object
      properties:
        name:
          type: string
          description: The new name of the device. If excluded from the request, the
            device name is not updated.
          example: Robot 1
    DeviceOrderBy:
      type: string
      enum:
      - id:asc
      - id:desc
      - created_at:desc
      - created_at:asc
      x-enum-varnames:
      - DEVICE_ORDER_BY_ID_ASC
      - DEVICE_ORDER_BY_ID_DESC
      - DEVICE_ORDER_BY_CREATED_AT_DESC
      - DEVICE_ORDER_BY_CREATED_AT_ASC
      default: created_at:desc
    DeviceListExpansion:
      type: string
      enum:
      - total_count
      x-enum-varnames:
      - DEVICE_LIST_EXPAND_TOTAL_COUNT
    DeviceList:
      allOf:
