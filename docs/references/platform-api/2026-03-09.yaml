          print(config_instances)
      x-mint:
        content: |
          | Scope | Required |
          |-------|----------|
          | `config_instances:read` | Yes |
    post:
      tags:
      - Config Instances
      summary: Create
      operationId: createConfigInstance
      description: Create a new config instance.
      parameters:
      - $ref: '#/components/parameters/config_instance_expansions'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConfigInstanceRequest'
      responses:
        '200':
          description: Successfully created the config instance.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigInstance'
      x-codeSamples:
      - lang: Python
        source: |-
          import os
          from miru_platform_sdk import Miru

          client = Miru(
              api_key=os.environ.get("MIRU_API_KEY"),  # This is the default and can be omitted
          )
          config_instance = client.config_instances.create(
              config_schema_id="cfg_sch_123",
              content={
                  "data": "{\n  \"enable_autonomy\": true,\n  \"enable_remote_control\": true,\n  \"max_payload_kg\": 10.0\n}\n",
                  "format": "json",
              },
          )
          print(config_instance.id)
      x-mint:
        content: |
          | Scope | Required |
          |-------|----------|
          | `config_instances:write` | Yes |
  /config_instances/{config_instance_id}/content:
    parameters:
    - $ref: '#/components/parameters/MiruVersion'
    get:
      tags:
      - Config Instances
      summary: Download Content
      operationId: getConfigInstanceContent
      description: Download the content of a config instance.
      parameters:
      - $ref: '#/components/parameters/config_instance_id'
      - $ref: '#/components/parameters/disposition'
      responses:
        '200':
          description: Successfully retrieved the config instance content. The Content-Type
            header is set according to the instance format.
          headers:
            Content-Disposition:
              description: Header indicating whether the file is returned inline or
                as an attachment.
              schema:
                type: string
                example: inline
            Content-Type:
              description: The MIME type of the instance content.
              schema:
                type: string
                example: application/json
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
                description: The raw config instance content.
      x-codeSamples:
      - lang: Python
        source: |-
          import os
          from miru_platform_sdk import Miru

          client = Miru(
              api_key=os.environ.get("MIRU_API_KEY"),  # This is the default and can be omitted
          )
          response = client.config_instances.content(
              config_instance_id="cfg_inst_123",
          )
          print(response)
          content = response.read()
          print(content)
      x-mint:
        content: |
          | Scope | Required |
          |-------|----------|
          | `config_instances:read` | Yes |
